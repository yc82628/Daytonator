<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DayTonator</title>
<style>
  :root{
    --bg:#0e0f13; --panel:#16181f; --panel2:#1c1f28; --line:#2a2e3a;
    --txt:#e7e9ee; --muted:#9aa0ad; --mono:'SFMono-Regular',Consolas,monospace;
    --green:#3ddc97; --green-bg:#11271f; --amber:#f2b84b; --amber-bg:#2a2310;
    --red:#ff5d5d; --red-bg:#2a1416; --blue:#5da9ff; --blue-bg:#10202e;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,Segoe UI,sans-serif;line-height:1.5}
  .wrap{max-width:820px;margin:0 auto;padding:28px 20px 80px}
  .head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .dot{width:26px;height:26px;border-radius:7px;background:var(--red-bg);color:var(--red);
    display:flex;align-items:center;justify-content:center;font-size:16px}
  .brand h1{font-size:22px;margin:0;font-weight:600}
  .tag{color:var(--muted);font-size:13px}
  .pill{font-size:12px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);
    padding:5px 10px;border-radius:8px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;margin:20px 0 8px}
  .controls input{flex:1;min-width:200px;background:var(--panel);border:1px solid var(--line);
    color:var(--txt);border-radius:8px;padding:10px 12px;font-family:var(--mono);font-size:13px}
  button{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer}
  button:hover{border-color:#3a4150}
  button.go{background:var(--red);border-color:var(--red);color:#1a0608;font-weight:600}
  .demos{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
  .demos button{font-family:var(--mono);font-size:12px}
  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:18px 0}
  .card{background:var(--panel2);border-radius:10px;padding:12px 14px}
  .card .lbl{color:var(--muted);font-size:12px}
  .card .num{font-size:22px;font-weight:600;margin-top:2px}
  .res{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px}
  .res.mal{background:var(--red-bg);border-color:#5a2327}
  .res.sus{background:var(--amber-bg);border-color:#5a4a1c}
  .res .top{display:flex;align-items:center;gap:10px}
  .res .name{font-weight:600;font-size:15px}
  .res .ver{color:var(--muted);font-size:12px;font-family:var(--mono)}
  .badge{margin-left:auto;font-size:12px;font-weight:600;padding:4px 10px;border-radius:8px}
  .badge.safe{background:var(--green-bg);color:var(--green)}
  .badge.suspicious{background:var(--amber-bg);color:var(--amber)}
  .badge.malicious{background:var(--red);color:#1a0608}
  .why{margin:10px 0 0;color:var(--txt)}
  .ev{margin-top:10px;border-top:1px solid var(--line);padding-top:8px}
  .ev .row{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:13px;padding:5px 0;color:#ffd9d9}
  .ev .k{font-size:11px;color:var(--muted);min-width:92px}
  .forks{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .fork{font-size:11px;font-family:var(--mono);padding:3px 8px;border-radius:6px;border:1px solid var(--line);color:var(--muted)}
  .fork.hit{border-color:var(--red);color:var(--red)}
  .foot{color:var(--muted);font-size:12px;margin-top:10px;display:flex;align-items:center;gap:6px}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--blue);
    border-radius:50%;animation:s 0.8s linear infinite;vertical-align:-2px}
  @keyframes s{to{transform:rotate(360deg)}}
  .hint{color:var(--muted);font-size:13px;margin-top:6px}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="brand">
      <div class="dot">&#9763;</div>
      <div><h1>DayTonator</h1><div class="tag">detonate before you install</div></div>
    </div>
    <span class="pill">powered by Daytona</span>
  </div>

  <div class="demos" id="demos"></div>
  <div class="controls">
    <input id="pkg" placeholder="package name (or pick a demo above)" />
    <button class="go" id="go">Detonate</button>
  </div>
  <div class="hint" id="hint">Tip: the <b>evasive-stealer</b> demo is the one to show &mdash; silent on the clean fork, fires only on the AWS fork.</div>

  <div id="out"></div>
</div>

<script>
const out = document.getElementById('out');
const pkgInput = document.getElementById('pkg');

fetch('/api/demos').then(r=>r.json()).then(d=>{
  const box = document.getElementById('demos');
  d.demos.forEach(name=>{
    const b = document.createElement('button');
    b.textContent = name;
    b.onclick = ()=>{ pkgInput.value = name; detonate(name); };
    box.appendChild(b);
  });
});

document.getElementById('go').onclick = ()=> detonate(pkgInput.value.trim());
pkgInput.addEventListener('keydown', e=>{ if(e.key==='Enter') detonate(pkgInput.value.trim()); });

function detonate(pkg){
  if(!pkg) return;
  out.innerHTML = `<div class="res"><span class="spin"></span> &nbsp;detonating <b>${esc(pkg)}</b> across baited forks&hellip;</div>`;
  fetch('/api/detonate', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({package: pkg, full: true})
  }).then(r=>r.json()).then(render).catch(e=>{
    out.innerHTML = `<div class="res mal">error: ${esc(String(e))}</div>`;
  });
}

function render(d){
  if(d.error){ out.innerHTML = `<div class="res mal">error: ${esc(d.error)}</div>`; return; }
  const v = d.verdict;
  const cls = v.label;                       // safe | suspicious | malicious
  const resCls = cls==='malicious'?'mal':(cls==='suspicious'?'sus':'');
  const forks = (d.traces||[]).map(t=>{
    const hit = (t.events||[]).some(e=>['secret_read','network','exfil','process'].includes(e.kind));
    return `<span class="fork ${hit?'hit':''}">${esc(t.bait)}${hit?' &#9888;':''}</span>`;
  }).join('');
  const evidence = (v.evidence||[]).map(e=>{
    const [k, ...rest] = e.split(':');
    return `<div class="row"><span class="k">${esc(k)}</span>${esc(rest.join(':'))}</div>`;
  }).join('');

  out.innerHTML = `
    <div class="summary">
      <div class="card"><div class="lbl">forks run</div><div class="num">${(d.traces||[]).length}</div></div>
      <div class="card"><div class="lbl">verdict</div><div class="num" style="color:var(--${cls==='malicious'?'red':cls==='suspicious'?'amber':'green'})">${cls}</div></div>
      <div class="card"><div class="lbl">score</div><div class="num">${v.score}</div></div>
      <div class="card"><div class="lbl">judged via</div><div class="num" style="font-size:16px">${esc(v.via)}</div></div>
    </div>
    <div class="res ${resCls}">
      <div class="top">
        <span class="name">${esc(d.package)}</span>
        <span class="badge ${cls}">${cls}</span>
      </div>
      <p class="why">${esc(v.explanation)}</p>
      <div class="forks">${forks}</div>
      ${evidence ? `<div class="ev">${evidence}</div>` : ''}
      <div class="foot">&#9729; contained in sandbox &middot; host untouched</div>
    </div>`;
}

function esc(s){ return String(s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
</script>
</body>
</html>
